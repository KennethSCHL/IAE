<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primogem Pity Calculator</title>

    <!-- Icon Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* Font custom */
        @font-face {
            font-family: 'GenshinFont';
            src: url('./assets/fonts/zh-cn.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'GenshinFont', Arial, sans-serif;
            background-color: #0f172a;
            color: white;
            text-align: center;
            min-height: 100vh;

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .overlay {
            min-height: 100vh;
            background: rgba(0, 20, 50, 0.35);
            padding: 25px 20px 45px;
        }

        .topbar {
            margin-bottom: 25px;
        }

        .topbar a {
            display: inline-block;
            color: white;
            text-decoration: none;
            font-size: 16px;
            padding: 10px 22px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.22);
            box-shadow: 0 5px 12px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .topbar a:hover {
            background: rgba(255, 255, 255, 0.38);
            transform: translateY(-3px);
        }

        .container {
            max-width: 760px;
            margin: 0 auto;
        }

        h1 {
            font-size: 42px;
            font-weight: normal;
            margin-bottom: 10px;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
        }

        .subtitle {
            font-size: 17px;
            color: #eaf7ff;
            margin-bottom: 32px;
            line-height: 1.5;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.6);
        }

        .card {
            background: rgba(255, 255, 255, 0.78);
            color: #12345f;
            border-radius: 18px;
            padding: 28px;
            text-align: left;
            box-shadow: 0 8px 18px rgba(0,0,0,0.25);
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 15px;
            color: #12345f;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid rgba(18, 52, 95, 0.25);
            outline: none;
            font-family: Arial, sans-serif;
            font-size: 15px;
            color: #12345f;
            background: rgba(255, 255, 255, 0.9);
        }

        input:focus {
            border-color: #7ecbff;
            box-shadow: 0 0 0 3px rgba(126, 203, 255, 0.35);
        }

        .calculate-btn {
            width: 100%;
            margin-top: 8px;
            padding: 13px 18px;
            border: none;
            border-radius: 20px;
            background: #7ecbff;
            color: white;
            cursor: pointer;
            font-family: 'GenshinFont', Arial, sans-serif;
            font-size: 16px;
            box-shadow: 0 5px 12px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .calculate-btn:hover {
            transform: translateY(-3px);
            background: #5db9f3;
        }

        .result {
            margin-top: 22px;
            background: rgba(255, 255, 255, 0.72);
            border-radius: 16px;
            padding: 18px;
            line-height: 1.8;
            color: #244b78;
            text-align: left;
        }

        .result p {
            margin-bottom: 6px;
        }

        .result strong {
            color: #12345f;
        }

        .status-success {
            color: #16784b;
        }

        .status-failed {
            color: #b45309;
        }

        @media (max-width: 700px) {
            .overlay {
                padding: 22px 14px 40px;
            }

            h1 {
                font-size: 30px;
            }

            .subtitle {
                font-size: 15px;
                margin-bottom: 25px;
            }

            .card {
                padding: 22px 18px;
            }

            input {
                font-size: 14px;
            }

            .calculate-btn {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

    <div class="overlay">

        <div class="topbar">
            <a href="/">
                <i class="fa-solid fa-house"></i> Home
            </a>
        </div>

        <div class="container">
            <h1>Primogem Pity Calculator</h1>
            <p class="subtitle">Hitung apakah primogem kamu cukup untuk mencapai pity 90</p>

            <div class="card">
                <div class="form-group">
                    <label for="startDate">Tanggal mulai farming</label>
                    <input type="date" id="startDate">
                </div>

                <div class="form-group">
                    <label for="targetDate">Tanggal target</label>
                    <input type="date" id="targetDate">
                </div>

                <div class="form-group">
                    <label for="currentPrimogems">Primogem yang dimiliki sekarang</label>
                    <input type="number" id="currentPrimogems" placeholder="contoh: 3200">
                </div>

                <div class="form-group">
                    <label for="dailyPrimogems">Primogem per hari</label>
                    <input type="number" id="dailyPrimogems" placeholder="contoh: 60">
                </div>

                <div class="form-group">
                    <label for="currentPity">Pity saat ini</label>
                    <input type="number" id="currentPity" placeholder="contoh: 45" min="0" max="89">
                </div>

                <button class="calculate-btn" onclick="calculatePrimogems()">
                    <i class="fa-solid fa-calculator"></i> Hitung Primogem
                </button>

                <div class="result" id="result">
                    <p>Hasil perhitungan akan tampil di sini.</p>
                </div>
            </div>
        </div>

    </div>

    <script>
        function loadBackground() {
            fetch('/banners-background')
                .then(async function(res) {
                    const data = await res.json();

                    if (!res.ok) {
                        throw new Error(data.error || 'Gagal mengambil background');
                    }

                    return data;
                })
                .then(function(data) {
                    if (data.image) {
                        document.body.style.backgroundImage = "url('" + data.image + "')";
                        document.body.style.backgroundSize = "cover";
                        document.body.style.backgroundPosition = "center";
                        document.body.style.backgroundRepeat = "no-repeat";
                        document.body.style.backgroundAttachment = "fixed";
                    }
                })
                .catch(function(err) {
                    console.error('Background banner gagal dimuat:', err);
                });
        }

        function calculatePrimogems() {
            const startDate = document.getElementById("startDate").value;
            const targetDate = document.getElementById("targetDate").value;
            const currentPrimogems = parseInt(document.getElementById("currentPrimogems").value) || 0;
            const dailyPrimogems = parseInt(document.getElementById("dailyPrimogems").value) || 0;
            const currentPity = parseInt(document.getElementById("currentPity").value) || 0;

            const resultBox = document.getElementById("result");

            if (!startDate || !targetDate) {
                resultBox.innerHTML = "<p>Silakan isi tanggal mulai dan tanggal target.</p>";
                return;
            }

            if (currentPity < 0 || currentPity > 89) {
                resultBox.innerHTML = "<p>Pity saat ini harus di antara 0 sampai 89.</p>";
                return;
            }

            const start = new Date(startDate);
            const target = new Date(targetDate);

            const diffTime = target - start;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            if (diffDays < 0) {
                resultBox.innerHTML = "<p>Tanggal target harus setelah tanggal mulai.</p>";
                return;
            }

            const totalFarmed = diffDays * dailyPrimogems;
            const totalPrimogems = currentPrimogems + totalFarmed;

            const additionalPulls = Math.floor(totalPrimogems / 160);
            const totalPity = currentPity + additionalPulls;

            const pullsNeededTo90 = Math.max(90 - currentPity, 0);
            const primogemsNeededTo90 = pullsNeededTo90 * 160;

            const reachedFiveStar = totalPity >= 90;
            const remainingPulls = Math.max(90 - totalPity, 0);
            const remainingPrimogems = remainingPulls * 160;

            const statusText = reachedFiveStar
                ? "<span class='status-success'>Mencapai pity 90, bintang 5 didapat</span>"
                : "<span class='status-failed'>Belum mencapai pity 90</span>";

            resultBox.innerHTML = `
                <p><strong>Hari tersisa:</strong> ${diffDays} hari</p>
                <p><strong>Primogem saat ini:</strong> ${currentPrimogems}</p>
                <p><strong>Primogem yang bisa dikumpulkan:</strong> ${totalFarmed}</p>
                <p><strong>Total primogem pada tanggal target:</strong> ${totalPrimogems}</p>
                <p><strong>1 pull =</strong> 160 primogem</p>
                <p><strong>Pull tambahan yang bisa dilakukan:</strong> ${additionalPulls}</p>
                <p><strong>Pity saat ini:</strong> ${currentPity}</p>
                <p><strong>Total pity pada tanggal target:</strong> ${totalPity}</p>
                <p><strong>Pull yang dibutuhkan untuk mencapai pity 90:</strong> ${pullsNeededTo90}</p>
                <p><strong>Primogem yang dibutuhkan untuk mencapai pity 90:</strong> ${primogemsNeededTo90}</p>
                <p><strong>Status:</strong> ${statusText}</p>
                <p><strong>Sisa pull menuju pity 90:</strong> ${remainingPulls}</p>
                <p><strong>Sisa primogem menuju pity 90:</strong> ${remainingPrimogems}</p>
            `;
        }

        loadBackground();
    </script>

</body>
</html>
