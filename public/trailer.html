<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genshin Trailers</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .topbar {
            padding: 20px;
        }

        .topbar a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: bold;
        }

        h1 {
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 15px;
            border: 2px solid #38bdf8;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .card iframe {
            width: 100%;
            height: 220px;
            border: none;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .card h2 {
            margin-top: 0;
            margin-bottom: 10px;
        }

        .meta {
            line-height: 1.8;
        }

        .empty-text {
            color: #cbd5e1;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <a href="/">Home</a>
    </div>

    <h1>Genshin Trailers</h1>

    <div class="grid" id="trailers"></div>

    <script>
        function convertYoutubeUrl(url) {
            if (!url) return "";

            if (url.includes("youtube.com/watch?v=")) {
                const videoId = url.split("watch?v=")[1].split("&")[0];
                return `https://www.youtube.com/embed/${videoId}`;
            }

            if (url.includes("youtu.be/")) {
                const videoId = url.split("youtu.be/")[1].split("?")[0];
                return `https://www.youtube.com/embed/${videoId}`;
            }

            if (url.includes("youtube.com/embed/")) {
                return url;
            }

            return url;
        }

        function renderTrailers(trailers) {
            const container = document.getElementById("trailers");
            container.innerHTML = "";

            if (!trailers.length) {
                container.innerHTML = `<p class="empty-text">Belum ada data trailer.</p>`;
                return;
            }

            trailers.forEach((trailer) => {
                const div = document.createElement("div");
                div.classList.add("card");

                const embedUrl = convertYoutubeUrl(trailer.video_url);

                div.innerHTML = `
                    <iframe
                        src="${embedUrl}"
                        title="${trailer.title}"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen>
                    </iframe>

                    <h2>${trailer.title}</h2>

                    <div class="meta">
                        <p><strong>Character:</strong> ${trailer.character_name || '-'}</p>
                        <p><strong>Release Date:</strong> ${trailer.release_date || '-'}</p>
                    </div>
                `;

                container.appendChild(div);
            });
        }

        function loadTrailers() {
            fetch('/trailers')
                .then(async (res) => {
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Gagal mengambil data trailers');
                    return data;
                })
                .then(data => {
                    renderTrailers(data.results);
                })
                .catch(err => {
                    console.error(err);
                    alert('Gagal mengambil data trailers');
                });
        }

        loadTrailers();
    </script>
</body>
</html>
