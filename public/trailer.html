<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genshin Trailers</title>

    <!-- Icon Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* Font custom */
        @font-face {
            font-family: 'GenshinFont';
            src: url('./assets/fonts/zh-cn.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'GenshinFont', Arial, sans-serif;
            background-color: #0f172a;
            color: white;
            text-align: center;
            min-height: 100vh;

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .overlay {
            min-height: 100vh;
            background: rgba(0, 20, 50, 0.35);
            padding: 25px 20px 45px;
        }

        .topbar {
            margin-bottom: 25px;
        }

        .topbar a {
            display: inline-block;
            color: white;
            text-decoration: none;
            font-size: 16px;
            padding: 10px 22px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.22);
            box-shadow: 0 5px 12px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .topbar a:hover {
            background: rgba(255, 255, 255, 0.38);
            transform: translateY(-3px);
        }

        h1 {
            font-size: 44px;
            font-weight: normal;
            margin-bottom: 10px;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
        }

        .subtitle {
            font-size: 17px;
            color: #eaf7ff;
            margin-bottom: 35px;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.6);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.78);
            color: #12345f;
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.25);
            transition: 0.3s;
            text-align: left;
        }

        .card:hover {
            transform: translateY(-6px);
            background: rgba(255, 255, 255, 0.92);
        }

        .card iframe {
            width: 100%;
            height: 220px;
            border: none;
            border-radius: 14px;
            margin-bottom: 15px;
            box-shadow: 0 5px 12px rgba(0,0,0,0.25);
        }

        .card h2 {
            font-size: 23px;
            font-weight: normal;
            color: #12345f;
            margin-bottom: 12px;
            text-align: center;
        }

        .meta {
            background: rgba(255, 255, 255, 0.55);
            border-radius: 14px;
            padding: 12px 14px;
            color: #244b78;
            line-height: 1.7;
            text-align: center;
        }

        .meta p {
            font-size: 14px;
            margin: 4px 0;
        }

        .meta strong {
            color: #12345f;
        }

        .empty-text {
            color: white;
            margin-top: 30px;
            font-size: 18px;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.6);
        }

        @media (max-width: 700px) {
            .overlay {
                padding: 22px 14px 40px;
            }

            h1 {
                font-size: 32px;
            }

            .subtitle {
                font-size: 15px;
                margin-bottom: 28px;
            }

            .grid {
                grid-template-columns: 1fr;
                gap: 18px;
            }

            .card {
                padding: 15px;
            }

            .card iframe {
                height: 200px;
            }

            .card h2 {
                font-size: 19px;
            }
        }
    </style>
</head>

<body>

    <div class="overlay">

        <div class="topbar">
            <a href="/">
                <i class="fa-solid fa-house"></i> Home
            </a>
        </div>

        <h1>Genshin Trailers</h1>
        <p class="subtitle">Lihat trailer karakter Genshin Impact</p>

        <div class="grid" id="trailers"></div>

    </div>

    <script>
        function loadBackground() {
            fetch('/trailers-background')
                .then(function(res) {
                    return res.json();
                })
                .then(function(data) {
                    console.log('Background trailer:', data);

                    if (data.image) {
                        document.body.style.backgroundImage =
                            "linear-gradient(rgba(0, 20, 50, 0.35), rgba(0, 20, 50, 0.35)), url('" + data.image + "')";

                        document.body.style.backgroundSize = "cover";
                        document.body.style.backgroundPosition = "center";
                        document.body.style.backgroundRepeat = "no-repeat";
                        document.body.style.backgroundAttachment = "fixed";
                    } else {
                        console.log('Data image tidak ditemukan');
                    }
                })
                .catch(function(err) {
                    console.error('Background trailer gagal dimuat:', err);
                });
        }

        function convertYoutubeUrl(url) {
            if (!url) return "";

            if (url.includes("youtube.com/watch?v=")) {
                const videoId = url.split("watch?v=")[1].split("&")[0];
                return "https://www.youtube.com/embed/" + videoId;
            }

            if (url.includes("youtu.be/")) {
                const videoId = url.split("youtu.be/")[1].split("?")[0];
                return "https://www.youtube.com/embed/" + videoId;
            }

            if (url.includes("youtube.com/embed/")) {
                return url;
            }

            return url;
        }

        function renderTrailers(trailers) {
            const container = document.getElementById("trailers");
            container.innerHTML = "";

            if (!trailers.length) {
                container.innerHTML = "<p class='empty-text'>Belum ada data trailer.</p>";
                return;
            }

            trailers.forEach(function(trailer) {
                const div = document.createElement("div");
                div.classList.add("card");

                const embedUrl = convertYoutubeUrl(trailer.video_url);

                div.innerHTML = `
                    <iframe
                        src="${embedUrl}"
                        title="${trailer.title}"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen>
                    </iframe>

                    <h2>${trailer.title}</h2>

                    <div class="meta">
                        <p><strong>Character:</strong> ${trailer.character_name || '-'}</p>
                        <p><strong>Release Date:</strong> ${trailer.release_date || '-'}</p>
                    </div>
                `;

                container.appendChild(div);
            });
        }

        function loadTrailers() {
            fetch('/trailers')
                .then(async function(res) {
                    const data = await res.json();

                    if (!res.ok) {
                        throw new Error(data.error || 'Gagal mengambil data trailers');
                    }

                    return data;
                })
                .then(function(data) {
                    renderTrailers(data.results);
                })
                .catch(function(err) {
                    console.error('Data trailer gagal dimuat:', err);
                    alert('Gagal mengambil data trailers');
                });
        }

        loadBackground();
        loadTrailers();
    </script>

</body>
</html>
