<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genshin Homepage</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #f7f7f7, #1e293b);
            color: rgba(103, 201, 247, 0.815);
            min-height: 100vh;
             -webkit-text-stroke: 0.5px black;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.7);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 12px;
        }

        p {
            color: #000000;
            margin-bottom: 35px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .menu-card {
            background: rgba(99, 161, 253, 0.623);
            border: 2px solid #68ccf7;
            border-radius: 16px;
            padding: 28px 18px;
            color: rgb(255, 255, 255);
            text-decoration: none;
            transition: 0.3s;
        }

        .menu-card:hover {
            transform: translateY(-5px);
            background: #7eb6ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Genshin Impact Database</h1>
        <p>Pilih halaman yang ingin dilihat</p>

        <div class="menu-grid">
            <a href="/characters.html" class="menu-card">
                <h2>Characters</h2>
                <p>Lihat semua karakter</p>
            </a>

            <a href="/weapons.html" class="menu-card">
                <h2>Weapons</h2>
                <p>Lihat semua weapon</p>
            </a>
            <a href="/banners.html" class="menu-card">
    <h2>Kalkulator</h2>
    <p>Hitung apakah primogem kamu cukup</p>
    </a>
            <a href="/trailer.html" class="menu-card">
            <h2>Trailer</h2>
            <p>Trailer Character</p>
            </a>
        </div>
    </div>
</body>
</html>

<script>
    function loadHomepageBackground() {
        fetch('/homepage-background')
            .then(async (res) => {
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Gagal mengambil background');
                return data;
            })
            .then(data => {
                if (data.image) {
                    document.body.style.backgroundImage = `url('${data.image}')`;
                    document.body.style.backgroundSize = 'cover';
                    document.body.style.backgroundPosition = 'center';
                    document.body.style.backgroundRepeat = 'no-repeat';
                }
            })
            .catch(err => {
                console.error(err);
            });
    }

    loadHomepageBackground();
</script>
