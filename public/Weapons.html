<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genshin Weapons</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .topbar {
            padding: 20px;
        }

        .topbar a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: bold;
        }

        h1 {
            margin-top: 10px;
        }

        .controls {
            margin: 20px 0;
        }

        button {
            padding: 10px 18px;
            margin: 6px;
            border: none;
            border-radius: 8px;
            background: #38bdf8;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }

        .active-filter {
            background: orange;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.03);
            background: #334155;
        }

        .card img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .rarity-5_star { border: 2px solid gold; }
        .rarity-4_star { border: 2px solid #a855f7; }
        .rarity-3_star { border: 2px solid #60a5fa; }
        .rarity-2_star { border: 2px solid #94a3b8; }
        .rarity-1_star { border: 2px solid #64748b; }
    </style>
</head>
<body>
    <div class="topbar">
        <a href="/">Home</a>
    </div>

    <h1>Genshin Weapons</h1>

    <div class="controls">
        <button id="btn-all" onclick="filterWeapons('all')">All</button>
        <button id="btn-5" onclick="filterWeapons('5_star')">5 Star</button>
        <button id="btn-4" onclick="filterWeapons('4_star')">4 Star</button>
        <button id="btn-3" onclick="filterWeapons('3_star')">3 Star</button>
    </div>

    <div class="grid" id="weapons"></div>

    <script>
        let allWeapons = [];

        function renderWeapons(weapons) {
            const container = document.getElementById("weapons");
            container.innerHTML = "";

            weapons.forEach(weapon => {
                const div = document.createElement("div");
                div.classList.add("card", `rarity-${weapon.rarity}`);

                div.innerHTML = `
                    <img src="${weapon.image}" alt="${weapon.name}" onerror="this.style.display='none'">
                    <h3>${weapon.name}</h3>
                    <p><strong>Type:</strong> ${weapon.type}</p>
                    <p><strong>Rarity:</strong> ${weapon.rarity}</p>
                    <p><strong>Base ATK:</strong> ${weapon.baseAttack ?? '-'}</p>
                    <p><strong>Sub Stat:</strong> ${weapon.subStat}</p>
                `;

                container.appendChild(div);
            });
        }

        function setActiveButton(filter) {
            ["all", "5", "4", "3"].forEach(id => {
                const btn = document.getElementById(`btn-${id}`);
                if (btn) btn.classList.remove("active-filter");
            });

            if (filter === "all") document.getElementById("btn-all").classList.add("active-filter");
            if (filter === "5_star") document.getElementById("btn-5").classList.add("active-filter");
            if (filter === "4_star") document.getElementById("btn-4").classList.add("active-filter");
            if (filter === "3_star") document.getElementById("btn-3").classList.add("active-filter");
        }

        function filterWeapons(rarity) {
            if (rarity === "all") {
                renderWeapons(allWeapons);
            } else {
                renderWeapons(allWeapons.filter(weapon => weapon.rarity === rarity));
            }
            setActiveButton(rarity);
        }

        function loadWeapons() {
            fetch('/weapons')
                .then(async (res) => {
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Gagal mengambil data weapon');
                    return data;
                })
                .then(data => {
                    allWeapons = data.results;
                    renderWeapons(allWeapons);
                    setActiveButton('all');
                    console.log('TOTAL WEAPONS:', data.total_results);
                })
                .catch(err => {
                    console.error(err);
                    alert('Gagal mengambil data weapon');
                });
        }

        loadWeapons();
    </script>
</body>
</html>
