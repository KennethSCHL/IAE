<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genshin Weapons</title>

    <!-- Icon Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* Font custom */
        @font-face {
            font-family: 'GenshinFont';
            src: url('./assets/fonts/zh-cn.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'GenshinFont', Arial, sans-serif;
            background-color: #0f172a;
            color: white;
            text-align: center;
            min-height: 100vh;

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .overlay {
            min-height: 100vh;
            background: rgba(0, 20, 50, 0.35);
            padding: 25px 20px 45px;
        }

        .topbar {
            margin-bottom: 25px;
        }

        .topbar a {
            display: inline-block;
            color: white;
            text-decoration: none;
            font-size: 16px;
            padding: 10px 22px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.22);
            box-shadow: 0 5px 12px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .topbar a:hover {
            background: rgba(255, 255, 255, 0.38);
            transform: translateY(-3px);
        }

        h1 {
            font-size: 44px;
            font-weight: normal;
            margin-bottom: 20px;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
        }

        .controls {
            margin-bottom: 35px;
        }

        button {
            font-family: 'GenshinFont', Arial, sans-serif;
            padding: 10px 22px;
            margin: 6px;
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.82);
            color: #12345f;
            cursor: pointer;
            box-shadow: 0 5px 12px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.95);
        }

        .active-filter {
            background: #7ecbff;
            color: white;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 22px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.78);
            color: #12345f;
            border-radius: 18px;
            padding: 25px 18px;
            min-height: 310px;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            box-shadow: 0 8px 18px rgba(0,0,0,0.25);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-6px);
            background: rgba(255, 255, 255, 0.92);
        }

        .card img {
            width: 105px;
            height: 105px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .card h3 {
            font-size: 22px;
            font-weight: normal;
            margin-bottom: 14px;
            color: #12345f;
        }

        .card p {
            font-size: 14px;
            margin: 5px 0;
            color: #244b78;
            line-height: 1.4;
        }

        .card strong {
            color: #12345f;
        }

        .rarity-5_star {
            border: 2px solid #f4c542;
        }

        .rarity-4_star {
            border: 2px solid #b784ff;
        }

        .rarity-3_star {
            border: 2px solid #7ecbff;
        }

        .rarity-2_star {
            border: 2px solid #94a3b8;
        }

        .rarity-1_star {
            border: 2px solid #64748b;
        }

        @media (max-width: 700px) {
            .overlay {
                padding: 22px 14px 40px;
            }

            h1 {
                font-size: 32px;
            }

            .grid {
                grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
                gap: 16px;
            }

            .card {
                min-height: 275px;
                padding: 20px 14px;
            }

            .card img {
                width: 90px;
                height: 90px;
            }

            .card h3 {
                font-size: 18px;
            }

            .card p {
                font-size: 13px;
            }

            button {
                padding: 9px 16px;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>

    <div class="overlay">

        <div class="topbar">
            <a href="/">
                <i class="fa-solid fa-house"></i> Home
            </a>
        </div>

        <h1>Genshin Weapons</h1>

        <div class="controls">
            <button id="btn-all" onclick="filterWeapons('all')">All</button>
            <button id="btn-5" onclick="filterWeapons('5_star')">5 Star</button>
            <button id="btn-4" onclick="filterWeapons('4_star')">4 Star</button>
            <button id="btn-3" onclick="filterWeapons('3_star')">3 Star</button>
        </div>

        <div class="grid" id="weapons"></div>

    </div>

    <script>
        let allWeapons = [];

        function loadBackground() {
            fetch('/weapons-background')
                .then(async function(res) {
                    const data = await res.json();

                    if (!res.ok) {
                        throw new Error(data.error || 'Gagal mengambil background weapon');
                    }

                    return data;
                })
                .then(function(data) {
                    if (data.image) {
                        document.body.style.backgroundImage = "url('" + data.image + "')";
                        document.body.style.backgroundSize = "cover";
                        document.body.style.backgroundPosition = "center";
                        document.body.style.backgroundRepeat = "no-repeat";
                        document.body.style.backgroundAttachment = "fixed";
                    }
                })
                .catch(function(err) {
                    console.error('Background weapon gagal dimuat:', err);
                });
        }

        function renderWeapons(weapons) {
            const container = document.getElementById("weapons");
            container.innerHTML = "";

            weapons.forEach(function(weapon) {
                const div = document.createElement("div");

                div.classList.add("card", "rarity-" + weapon.rarity);

                div.innerHTML = `
                    <img src="${weapon.image}" alt="${weapon.name}" onerror="this.style.display='none'">
                    <h3>${weapon.name}</h3>
                    <p><strong>Type:</strong> ${weapon.type}</p>
                    <p><strong>Rarity:</strong> ${weapon.rarity}</p>
                    <p><strong>Base ATK:</strong> ${weapon.baseAttack ?? '-'}</p>
                    <p><strong>Sub Stat:</strong> ${weapon.subStat}</p>
                `;

                container.appendChild(div);
            });
        }

        function setActiveButton(filter) {
            const buttons = ["all", "5", "4", "3"];

            buttons.forEach(function(id) {
                const btn = document.getElementById("btn-" + id);

                if (btn) {
                    btn.classList.remove("active-filter");
                }
            });

            if (filter === "all") {
                document.getElementById("btn-all").classList.add("active-filter");
            }

            if (filter === "5_star") {
                document.getElementById("btn-5").classList.add("active-filter");
            }

            if (filter === "4_star") {
                document.getElementById("btn-4").classList.add("active-filter");
            }

            if (filter === "3_star") {
                document.getElementById("btn-3").classList.add("active-filter");
            }
        }

        function filterWeapons(rarity) {
            if (rarity === "all") {
                renderWeapons(allWeapons);
            } else {
                const filteredWeapons = allWeapons.filter(function(weapon) {
                    return weapon.rarity === rarity;
                });

                renderWeapons(filteredWeapons);
            }

            setActiveButton(rarity);
        }

        function loadWeapons() {
            fetch('/weapons')
                .then(async function(res) {
                    const data = await res.json();

                    if (!res.ok) {
                        throw new Error(data.error || 'Gagal mengambil data weapon');
                    }

                    return data;
                })
                .then(function(data) {
                    allWeapons = data.results;

                    renderWeapons(allWeapons);
                    setActiveButton('all');

                    console.log('TOTAL WEAPONS:', data.total_results);
                })
                .catch(function(err) {
                    console.error('Data weapon gagal dimuat:', err);
                    alert('Gagal mengambil data weapon');
                });
        }

        loadBackground();
        loadWeapons();
    </script>

</body>
</html>
